<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Nexus &amp; Co — Members</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page-dashboard page-members">
  <div class="nebula" aria-hidden="true">
    <div class="nebula-cloud nebula-cloud--1"></div>
    <div class="nebula-cloud nebula-cloud--2"></div>
    <div class="nebula-cloud nebula-cloud--3"></div>
    <div class="nebula-cloud nebula-cloud--4"></div>
  </div>
  <canvas id="portal-canvas" aria-hidden="true"></canvas>
  <div class="grain" aria-hidden="true"></div>

  <header id="site-header"></header>

  <main class="dashboard-main">
    <div class="dashboard-wrap">
      <div class="terminal-frame dashboard-frame">
        <div class="frame-bar">
          <span class="frame-dots" aria-hidden="true"></span>
          <span class="frame-title">members — principal directory</span>
        </div>
        <div class="frame-body">
          <header class="dashboard-header">
            <h1 class="dashboard-title accent-lavender">Members</h1>
            <p class="dashboard-sub muted">
              Principal committee and operators. Directory visible to
              <span class="accent-cyan">connected wallets</span> only.
            </p>
          </header>
          <div class="member-grid" id="member-grid"></div>
          <p class="dashboard-disclaimer muted">
            Profiles are internal directory entries. Public social links reference
            publicly available handles only.
          </p>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer site-footer--unified">
    <div class="footer-inner footer-inner--unified"></div>
  </footer>

  <script src="data.js"></script>
  <script src="wallet.js"></script>
  <script src="nav-utils.js"></script>
  <script src="header.js"></script>
  <script src="footer.js"></script>
  <script src="script.js"></script>
  <script src="members.js"></script>
</body>
</html>
